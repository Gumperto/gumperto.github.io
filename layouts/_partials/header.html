<!-- Home page -->
<h1><a href="{{ relURL "" }}">gumperto.github.io</a></h1>

<!-- Navbar -->
{{ partial "navbar" . }}

<!-- Title -->
<h1>{{ .Title }}</h1>

<!-- Tags -->

<!-- This will insert a comma *before* each item, except for the first,  -->
<!-- creating the illusion of a comma separator -->
{{ range $k, $v := .GetTerms "tags" }}{{ if $k }}, {{ end }}<i class="tags"><a href="{{- .RelPermalink }}">{{- .LinkTitle }}</a></i>{{- end }}
